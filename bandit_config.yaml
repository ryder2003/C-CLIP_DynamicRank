# C-CLIP with MAB Dynamic Rank Selection — 5-Task Benchmark
#
# Uses 5 datasets from the CoDyRA benchmark (available on server):
#   0. fgvc_aircraft   — fine-grained aircraft variants (100 classes)
#   1. dtd             — describable textures (47 classes)
#   2. eurosat         — satellite imagery (10 classes)
#   3. flowers102      — fine-grained flowers (102 classes)
#   4. oxford_pets     — fine-grained animals (37 classes)
#
# Bandit setup: 4 arms + 5 tasks
#   - Tasks 0-3: forced exploration (one pull per arm, in rank_choices order)
#   - Task 4: first exploitative pull using UCB1
#
# Run:
#   python scripts/prepare_real_datasets.py   # prepare data CSVs first
#   python src/train_bandit.py --config bandit_config.yaml --fresh

# ── Model ──────────────────────────────────────────────────────────────────
model:
  clip_model_name: "ViT-B-16"
  pretrained: "openai"
  # lora_r is NOT used — the bandit chooses rank per task.
  # lora_alpha is NOW DYNAMIC: set to 2*rank inside cclip_bandit.py
  # This gives uniform scaling=2.0 for ALL ranks, so the bandit selects
  # rank purely for capacity (parameter count), not scaling magnitude.
  # The value below is a fallback only; it is overridden by the dynamic logic.
  lora_alpha: 32
  lora_dropout: 0.05                # was 0.1 — lower = more stable LoRA path
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "c_fc"
    - "c_proj"
  integration_coeff: 0.5            # was 0.35 — safe now that scaling is uniform at 2.0

# ── Multi-Armed Bandit configuration ──────────────────────────────────────
bandit:
  rank_choices: [16, 8, 32, 4]      # reordered: aircraft gets r=16 first (moderate)
  algorithm: "ucb1"                  # ucb1 | epsilon_greedy | thompson
  plasticity_w: 0.4                  # was 0.5 — weight stability more
  stability_w: 0.6                   # was 0.5 — penalize forgetting harder
  ucb_c: 2.0
  epsilon: 0.3
  epsilon_decay: 0.85
  save_path: "checkpoints/bandit_run/bandit_state.json"

# ── Training ──────────────────────────────────────────────────────────────
training:
  batch_size: 64
  accumulate_grad_batches: 4         # effective batch = 256
  epochs_per_task: 30                # was 10 — minimum for convergence on small datasets
  base_lr: 0.00005                   # was 0.0001 — lower for stability
  text_lr_multiplier: 3              # was 5 — text LR = 1.5e-4 (prevents text drift)
  weight_decay: 0.01
  warmup_epochs: 3                   # ~10% warmup ratio
  optimizer: "adamw"
  beta1: 0.9
  beta2: 0.99
  temperature: 0.07
  ckc_weight: 2.0                    # was 5.0 — balance distillation vs task learning
  pretrained_distill_weight: 1.5     # was 1.0 — slightly stronger anchor

# ── Data ─────────────────────────────────────────────────────────────────
data:
  image_size: 224
  max_text_length: 77
  num_workers: 4                     # Linux server

# ── Datasets (5-task benchmark) ───────────────────────────────────────────
datasets:
  # Task 0: FGVC Aircraft (fine-grained, ~10K images)
  - name: "fgvc_aircraft"
    train_path: "data/fgvc_aircraft/train.csv"
    val_path: "data/fgvc_aircraft/val.csv"
    image_dir: "datasets/fgvc_aircraft/images"

  # Task 1: DTD (textures, ~5K images)
  - name: "dtd"
    train_path: "data/dtd/train.csv"
    val_path: "data/dtd/val.csv"
    image_dir: "datasets/dtd/images"

  # Task 2: EuroSAT (satellite, ~27K images)
  - name: "eurosat"
    train_path: "data/eurosat/train.csv"
    val_path: "data/eurosat/val.csv"
    image_dir: "datasets/eurosat"

  # Task 3: Oxford Flowers-102 (fine-grained, ~8K images)
  - name: "flowers102"
    train_path: "data/flowers102/train.csv"
    val_path: "data/flowers102/val.csv"
    image_dir: "datasets/102flowers/jpg"

  # Task 4: Oxford-IIIT Pets (fine-grained, ~7K images)
  - name: "oxford_pets"
    train_path: "data/oxford_pets/train.csv"
    val_path: "data/oxford_pets/val.csv"
    image_dir: "datasets/Oxford_IIITPets/images"

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  project_name: "c-clip-bandit"
  experiment_name: "mab_5task_ucb1_fixed"
  log_every_n_steps: 50
  checkpoint_dir: "checkpoints/bandit_run"
  use_wandb: false

# ── Hardware ──────────────────────────────────────────────────────────────
hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"
