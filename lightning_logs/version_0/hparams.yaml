config:
  data:
    image_size: 224
    max_text_length: 77
    num_workers: 2
  datasets:
  - image_dir: data/task_1
    name: task_1
    train_path: data/task_1/train.csv
    val_path: data/task_1/val.csv
  - image_dir: data/task_2
    name: task_2
    train_path: data/task_2/train.csv
    val_path: data/task_2/val.csv
  hardware:
    accelerator: gpu
    devices: 1
    precision: 16-mixed
  logging:
    checkpoint_dir: checkpoints/sample_test
    experiment_name: sample_data_test
    log_every_n_steps: 5
    project_name: c-clip-test
    save_checkpoint_every_n_epochs: 2
    use_wandb: false
  model:
    clip_model_name: ViT-B-32
    integration_coeff: 0.5
    lora_alpha: 16
    lora_dropout: 0.1
    lora_r: 8
    lora_target_modules:
    - q_proj
    - v_proj
    pretrained: openai
  training:
    base_lr: 1.0e-05
    batch_size: 16
    beta1: 0.9
    beta2: 0.99
    epochs_per_task: 5
    optimizer: adamw
    temperature: 0.07
    text_lr_multiplier: 10
    warmup_epochs: 1
    weight_decay: 0.2
current_task_idx: 0
