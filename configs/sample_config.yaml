# Sample Configuration for Testing C-CLIP with Synthetic Data
# Use this to test the pipeline before downloading large datasets

# Model settings
model:
  clip_model_name: "ViT-B-32"  # Faster for testing
  pretrained: "openai"
  lora_r: 8  # Smaller rank for faster testing
  lora_alpha: 16
  lora_dropout: 0.1
  lora_target_modules:
    - "q_proj"
    - "v_proj"
  integration_coeff: 0.5

# Training settings
training:
  batch_size: 16  # Small batch for testing
  epochs_per_task: 5  # Few epochs for quick testing
  base_lr: 0.00001
  text_lr_multiplier: 10
  weight_decay: 0.2
  warmup_epochs: 1
  optimizer: "adamw"
  beta1: 0.9
  beta2: 0.99
  temperature: 0.07

# Data settings
data:
  image_size: 224
  max_text_length: 77
  num_workers: 2  # Fewer workers for testing

# Sample datasets (created by create_sample_dataset.py)
datasets:
  - name: "task_1"
    train_path: "data/task_1/train.csv"
    val_path: "data/task_1/val.csv"
    image_dir: "data/task_1"
  
  - name: "task_2"
    train_path: "data/task_2/train.csv"
    val_path: "data/task_2/val.csv"
    image_dir: "data/task_2"

# Logging and checkpointing
logging:
  project_name: "c-clip-test"
  experiment_name: "sample_data_test"
  log_every_n_steps: 5
  save_checkpoint_every_n_epochs: 2
  checkpoint_dir: "checkpoints/sample_test"
  use_wandb: false

# Hardware settings
hardware:
  accelerator: "gpu"
  devices: 1
  precision: "16-mixed"
