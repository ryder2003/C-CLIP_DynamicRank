# C-CLIP with MAB Dynamic Rank Selection — 8-Task Experiment
#
# Task sequence chosen for maximum domain diversity (following CoDyRA paper insight
# that rank sensitivity varies across visual domains):
#   1. flowers102      — fine-grained natural (102 classes)
#   2. dtd             — textures, very different visual statistics (47 classes)
#   3. oxford_pets     — fine-grained animal recognition (37 classes)
#   4. fgvc_aircraft   — fine-grained man-made objects (100 classes)
#   5. eurosat         — satellite imagery, extreme domain shift (10 classes)
#   6. food101         — food recognition, large-scale (101 classes)
#   7. stanford_cars   — fine-grained vehicle recognition (196 classes)
#   8. simpsons        — cartoon characters, max domain shift (41 classes)
#
# With 4 arms and 8 tasks:
#   - Tasks 0-3: forced exploration (one pull per arm)
#   - Tasks 4-7: UCB1 exploitation — bandit has 4 reward signals to exploit
#
# Run:
#   python src/train_bandit.py --config configs/bandit_config.yaml

# ── Model ──────────────────────────────────────────────────────────────────
model:
  clip_model_name: "ViT-B-16"
  pretrained: "openai"
  # NOTE: lora_r is NO LONGER used — the bandit chooses rank per task.
  # lora_alpha is dynamic: set to 2 * chosen_rank each task (keeps scaling = 2.0).
  lora_alpha: 32          # base value; overridden to 2*r each task
  lora_dropout: 0.1
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "c_fc"
    - "c_proj"
  integration_coeff: 0.7  # merging coefficient after each task

# ── Multi-Armed Bandit configuration ──────────────────────────────────────
bandit:
  # Arms: discrete rank values the bandit can choose from
  rank_choices: [4, 8, 16, 32]

  # Algorithm: 'ucb1' | 'epsilon_greedy' | 'thompson'
  #   ucb1          — best when tasks ≤ 10 (strong theoretical guarantees)
  #   thompson      — best when >10 tasks, naturally Bayesian
  #   epsilon_greedy— simple baseline, annealed epsilon
  algorithm: "ucb1"

  # Reward weights (must sum to 1.0)
  # plasticity_w: reward for doing well on the NEW task
  # stability_w : reward for retaining knowledge on previous tasks / zero-shot
  plasticity_w: 0.6
  stability_w: 0.4

  # UCB1 exploration constant (higher = more exploration)
  ucb_c: 2.0

  # Epsilon-greedy params (only used if algorithm = epsilon_greedy)
  epsilon: 0.3
  epsilon_decay: 0.85   # epsilon *= decay after each task

  # Persist bandit state across runs (useful for long experiments)
  save_path: "checkpoints/bandit_run/bandit_state.json"

# ── Training ──────────────────────────────────────────────────────────────
training:
  batch_size: 64
  accumulate_grad_batches: 4      # effective batch = 256
  epochs_per_task: 40
  base_lr: 0.0002                 # 2e-4 for LoRA params
  text_lr_multiplier: 5           # text LR = base_lr * 5
  weight_decay: 0.01
  warmup_epochs: 3
  optimizer: "adamw"
  beta1: 0.9
  beta2: 0.99
  temperature: 0.07

# ── Data ─────────────────────────────────────────────────────────────────
data:
  image_size: 224
  max_text_length: 77
  num_workers: 2                  # 2 for Windows, increase to 4 on Linux

# ── Datasets (8-task continual learning sequence) ─────────────────────────
# The order is designed to alternate domain types for diverse bandit signals.
# Each dataset has train/val CSVs (generated by scripts/prepare_bandit_datasets.py)
# and an image_dir pointing to the actual images.

datasets:
  # Task 0: Fine-grained flowers (natural domain)
  - name: "flowers102"
    train_path: "data/flowers102/train.csv"
    val_path: "data/flowers102/val.csv"
    image_dir: "datasets/102flowers/jpg"

  # Task 1: Textures (abstract visual patterns)
  - name: "dtd"
    train_path: "data/dtd/train.csv"
    val_path: "data/dtd/val.csv"
    image_dir: "datasets/dtd"

  # Task 2: Fine-grained pets (animal domain)
  - name: "oxford_pets"
    train_path: "data/oxford_pets/train.csv"
    val_path: "data/oxford_pets/val.csv"
    image_dir: "datasets/Oxford_IIITPets/images"

  # Task 3: Fine-grained aircraft (man-made objects)
  - name: "fgvc_aircraft"
    train_path: "data/fgvc_aircraft/train.csv"
    val_path: "data/fgvc_aircraft/val.csv"
    image_dir: "datasets/fgvc_aircraft"

  # Task 4: Satellite imagery (extreme domain shift)
  - name: "eurosat"
    train_path: "data/eurosat/train.csv"
    val_path: "data/eurosat/val.csv"
    image_dir: "datasets/eurosat"

  # Task 5: Food recognition (large-scale, medium difficulty)
  - name: "food101"
    train_path: "data/food101/train.csv"
    val_path: "data/food101/val.csv"
    image_dir: "datasets/food101"

  # Task 6: Fine-grained cars (vehicle domain)
  - name: "stanford_cars"
    train_path: "data/stanford_cars/train.csv"
    val_path: "data/stanford_cars/val.csv"
    image_dir: "datasets/stanford_cars"

  # Task 7: Cartoon characters (max domain shift from natural images)
  - name: "simpsons"
    train_path: "data/simpsons/train.csv"
    val_path: "data/simpsons/val.csv"
    image_dir: "datasets/simpsons_archive/simpsons_dataset"

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  project_name: "c-clip-bandit"
  experiment_name: "mab_8task_ucb1"
  log_every_n_steps: 50
  checkpoint_dir: "checkpoints/bandit_run"
  use_wandb: false

# ── Hardware ──────────────────────────────────────────────────────────────
hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"
