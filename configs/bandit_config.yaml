# C-CLIP with MAB Dynamic Rank Selection — 10-Task CoDyRA Benchmark
#
# Uses the EXACT 10-dataset MTIL benchmark from the CoDyRA paper:
#   "Adaptive Rank, Reduced Forgetting: Knowledge Retention in
#    Continual Learning VLMs with Dynamic Rank-Selective LoRA"
#
# Task sequence (following CoDyRA / CoOp ordering):
#   0. fgvc_aircraft   — fine-grained aircraft (100 classes)
#   1. caltech101      — general object recognition (101 classes)
#   2. dtd             — textures (47 classes)
#   3. eurosat         — satellite imagery (10 classes)
#   4. flowers102      — fine-grained flowers (102 classes)
#   5. food101         — food recognition (101 classes)
#   6. mnist           — handwritten digits (10 classes)
#   7. oxford_pets     — fine-grained animals (37 classes)
#   8. stanford_cars   — fine-grained vehicles (196 classes)
#   9. sun397          — scene recognition (397 classes)
#
# With 4 arms and 10 tasks:
#   - Tasks 0-3: forced exploration (one pull per arm)
#   - Tasks 4-9: UCB1 exploitation (6 pulls with reward signal)
#
# Run:
#   python src/train_bandit.py --config configs/bandit_config.yaml

# ── Model ──────────────────────────────────────────────────────────────────
model:
  clip_model_name: "ViT-B-16"
  pretrained: "openai"
  # lora_r is NOT used — the bandit chooses rank per task.
  # lora_alpha is dynamic: set to 2 * chosen_rank each task.
  lora_alpha: 32
  lora_dropout: 0.1
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "c_fc"
    - "c_proj"
  integration_coeff: 0.7

# ── Multi-Armed Bandit configuration ──────────────────────────────────────
bandit:
  rank_choices: [4, 8, 16, 32]
  algorithm: "ucb1"             # ucb1 | epsilon_greedy | thompson
  plasticity_w: 0.6
  stability_w: 0.4
  ucb_c: 2.0
  epsilon: 0.3
  epsilon_decay: 0.85
  save_path: "checkpoints/bandit_run/bandit_state.json"

# ── Training ──────────────────────────────────────────────────────────────
training:
  batch_size: 64
  accumulate_grad_batches: 4      # effective batch = 256
  epochs_per_task: 40
  base_lr: 0.0002
  text_lr_multiplier: 5
  weight_decay: 0.01
  warmup_epochs: 3
  optimizer: "adamw"
  beta1: 0.9
  beta2: 0.99
  temperature: 0.07

# ── Data ─────────────────────────────────────────────────────────────────
data:
  image_size: 224
  max_text_length: 77
  num_workers: 2                  # 2 for Windows; increase to 4 on Linux

# ── Datasets (10-task CoDyRA benchmark) ───────────────────────────────────
datasets:
  # Task 0: FGVC Aircraft
  - name: "fgvc_aircraft"
    train_path: "data/fgvc_aircraft/train.csv"
    val_path: "data/fgvc_aircraft/val.csv"
    image_dir: "datasets/fgvc_aircraft"

  # Task 1: Caltech-101
  - name: "caltech101"
    train_path: "data/caltech101/train.csv"
    val_path: "data/caltech101/val.csv"
    image_dir: "datasets/caltech101"

  # Task 2: DTD (Describable Textures)
  - name: "dtd"
    train_path: "data/dtd/train.csv"
    val_path: "data/dtd/val.csv"
    image_dir: "datasets/dtd"

  # Task 3: EuroSAT
  - name: "eurosat"
    train_path: "data/eurosat/train.csv"
    val_path: "data/eurosat/val.csv"
    image_dir: "datasets/eurosat"

  # Task 4: Oxford Flowers-102
  - name: "flowers102"
    train_path: "data/flowers102/train.csv"
    val_path: "data/flowers102/val.csv"
    image_dir: "datasets/102flowers/jpg"

  # Task 5: Food-101
  - name: "food101"
    train_path: "data/food101/train.csv"
    val_path: "data/food101/val.csv"
    image_dir: "datasets/food101"

  # Task 6: MNIST
  - name: "mnist"
    train_path: "data/mnist/train.csv"
    val_path: "data/mnist/val.csv"
    image_dir: "datasets/mnist/images"

  # Task 7: Oxford-IIIT Pets
  - name: "oxford_pets"
    train_path: "data/oxford_pets/train.csv"
    val_path: "data/oxford_pets/val.csv"
    image_dir: "datasets/Oxford_IIITPets/images"

  # Task 8: Stanford Cars
  - name: "stanford_cars"
    train_path: "data/stanford_cars/train.csv"
    val_path: "data/stanford_cars/val.csv"
    image_dir: "datasets/stanford_cars"

  # Task 9: SUN397
  - name: "sun397"
    train_path: "data/sun397/train.csv"
    val_path: "data/sun397/val.csv"
    image_dir: "datasets/sun397"

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  project_name: "c-clip-bandit"
  experiment_name: "mab_10task_codyra_ucb1"
  log_every_n_steps: 50
  checkpoint_dir: "checkpoints/bandit_run"
  use_wandb: false

# ── Hardware ──────────────────────────────────────────────────────────────
hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"
